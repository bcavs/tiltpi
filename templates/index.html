<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiltPi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap');

        :root {
            --amber: #c8913a;
            --amber-bright: #e5a84b;
            --amber-dim: rgba(200, 145, 58, 0.12);
            --amber-glow: rgba(200, 145, 58, 0.35);
            --copper: #b87333;
            --cream: #f0e6d3;
            --cream-dim: rgba(240, 230, 211, 0.7);
            --parchment: #d9cbb8;
            --ink: #2c2318;
            --ink-deep: #1a150e;
            --ink-surface: #241e15;
            --ink-card: rgba(28, 22, 14, 0.88);
            --muted: #7a6b56;
            --muted-dim: #564d3f;
            --danger: #c44;
            --success: #5a9e6f;
            --info: #6a9ab8;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Outfit', system-ui, sans-serif;
            --font-mono: 'DM Mono', 'Menlo', monospace;
            --radius: 12px;
            --radius-lg: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--ink-deep);
            color: var(--cream-dim);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            font-weight: 300;
            letter-spacing: 0.01em;
        }

        /* Grain overlay */
        body::after {
            content: '';
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ── Bubble canvas ── */
        #bubbles {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Cheers overlay ── */
        #cheers-overlay {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            pointer-events: none;
        }
        .cheers-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-display);
            font-size: 5rem; font-weight: 700;
            font-style: italic;
            color: var(--amber-bright);
            text-shadow: 0 0 60px var(--amber-glow), 0 0 120px rgba(200, 145, 58, 0.15);
            opacity: 0;
            animation: cheersIn 3s ease forwards;
        }
        @keyframes cheersIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            40% { transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -60%) scale(1); }
        }
        .confetti-piece {
            position: absolute;
            width: 8px; height: 8px;
            border-radius: 2px;
            opacity: 0;
            animation: confettiFall 3s ease forwards;
        }
        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }

        .content { position: relative; z-index: 1; }

        /* ── Header ── */
        .header {
            padding: 36px 24px 24px;
            text-align: center;
            border-bottom: 1px solid var(--amber-dim);
            background: linear-gradient(180deg, rgba(26, 21, 14, 0.95) 0%, transparent 100%);
        }
        .header h1 {
            font-family: var(--font-display);
            font-size: 2.4rem; font-weight: 700;
            color: var(--amber);
            letter-spacing: 0.04em;
            line-height: 1;
        }
        .header h1 span {
            font-weight: 400;
            font-style: italic;
            color: var(--muted);
            font-size: 0.5em;
            display: block;
            margin-top: 2px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-family: var(--font-body);
        }
        .header .sub {
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            margin-top: 10px;
            letter-spacing: 0.02em;
        }
        .brew-name {
            font-family: var(--font-display);
            color: var(--parchment);
            font-size: 1.15rem;
            margin-top: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
            font-style: italic;
        }
        .brew-name:hover { color: var(--amber-bright); }

        /* ── Settings modal ── */
        .modal-backdrop {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 50;
            backdrop-filter: blur(6px);
        }
        .modal-backdrop.open { display: flex; align-items: center; justify-content: center; }
        .modal {
            background: var(--ink-surface);
            border: 1px solid rgba(200, 145, 58, 0.15);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 90%; max-width: 400px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
        }
        .modal h2 {
            font-family: var(--font-display);
            color: var(--amber);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .modal label {
            display: block;
            font-family: var(--font-mono);
            color: var(--muted);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 6px; margin-top: 18px;
        }
        .modal label:first-of-type { margin-top: 0; }
        .modal input {
            width: 100%; padding: 11px 14px;
            background: rgba(200, 145, 58, 0.05);
            border: 1px solid rgba(200, 145, 58, 0.12);
            border-radius: 8px;
            color: var(--cream);
            font-size: 0.9rem;
            font-family: var(--font-body);
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .modal input:focus {
            border-color: rgba(200, 145, 58, 0.35);
            box-shadow: 0 0 0 3px rgba(200, 145, 58, 0.08);
        }
        .modal input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .modal input::placeholder { color: var(--muted-dim); }
        .modal-actions {
            display: flex; gap: 10px; margin-top: 26px;
            justify-content: flex-end;
        }

        /* ── Buttons ── */
        .btn {
            padding: 9px 22px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-family: var(--font-body);
            letter-spacing: 0.02em;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--amber);
            color: var(--ink);
        }
        .btn-primary:hover {
            background: var(--amber-bright);
            box-shadow: 0 0 20px rgba(200, 145, 58, 0.25);
        }
        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid rgba(200, 145, 58, 0.12);
        }
        .btn-ghost:hover {
            border-color: rgba(200, 145, 58, 0.3);
            color: var(--amber);
            background: rgba(200, 145, 58, 0.04);
        }
        .btn-sm { font-size: 0.72rem; padding: 6px 14px; }

        /* ── Cards grid ── */
        .cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px; padding: 28px 24px;
            max-width: 1020px;
            margin: 0 auto;
        }
        @media (max-width: 900px) {
            .cards {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 550px) {
            .cards {
                grid-template-columns: repeat(2, 1fr);
            }
            .cards > :last-child {
                grid-column: span 2;
            }
        }

        /* ── Card base ── */
        .gauge-card, .info-card {
            background: var(--ink-card);
            border: 1px solid rgba(200, 145, 58, 0.08);
            border-radius: var(--radius);
            padding: 20px 16px 16px;
            text-align: center;
            backdrop-filter: blur(12px);
            transition: border-color 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }
        .gauge-card::before, .info-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 145, 58, 0.15), transparent);
        }

        .gauge-card.temp-alert {
            border-color: rgba(204, 68, 68, 0.4);
            box-shadow: 0 0 30px rgba(204, 68, 68, 0.08);
        }
        .gauge-card .label, .info-card .label {
            font-family: var(--font-mono);
            color: var(--muted);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 14px;
        }

        /* ── Gauge ── */
        .gauge-wrap {
            position: relative;
            width: 100%; max-width: 160px;
            margin: 0 auto;
        }
        .gauge-wrap canvas {
            display: block;
            width: 100%; height: auto;
            margin: 0 auto;
        }
        .gauge-value {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 1.4rem; font-weight: 500;
        }
        .gauge-value.gravity { color: var(--amber-bright); }
        .gauge-value.temp { color: var(--copper); }
        .gauge-value.temp-danger { color: var(--danger); }
        .gauge-sub {
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            margin-top: 6px;
        }
        .temp-warning {
            color: var(--danger);
            font-family: var(--font-mono);
            font-size: 0.68rem;
            margin-top: 6px;
            font-weight: 500;
            animation: pulse 1.5s ease infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ── Info cards ── */
        .info-card .value {
            font-family: var(--font-mono);
            font-size: 1.6rem;
            font-weight: 500;
            margin-top: 8px;
        }
        .info-card .value.abv { color: var(--amber-bright); }
        .info-card .value.eta { color: var(--info); font-size: 1.2rem; }
        .info-card .value.status {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 600;
            font-style: italic;
        }
        .status-active { color: var(--success); }
        .status-slowing { color: var(--amber); }
        .status-complete { color: var(--copper); }
        .info-card .sub {
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.68rem;
            margin-top: 6px;
        }

        /* ── Progress ── */
        .progress-section {
            padding: 0 24px 10px;
            max-width: 700px;
            margin: 0 auto;
        }
        .progress-header {
            display: flex; justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .progress-bar-bg {
            height: 6px;
            background: rgba(200, 145, 58, 0.08);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--copper), var(--amber-bright));
            transition: width 1s ease;
            box-shadow: 0 0 16px var(--amber-glow);
        }
        .progress-label {
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--amber);
            margin-top: 8px;
            font-weight: 400;
        }

        /* ── Toolbar ── */
        .toolbar {
            display: flex; justify-content: center; gap: 8px;
            padding: 10px 24px 20px;
            flex-wrap: wrap;
        }
        .toolbar .btn { font-size: 0.72rem; padding: 7px 16px; }

        /* ── Charts ── */
        .chart-container { padding: 10px 24px 16px; }
        .chart-container canvas {
            background: var(--ink-card);
            border-radius: var(--radius);
            border: 1px solid rgba(200, 145, 58, 0.06);
        }

        /* ── No data ── */
        .no-data {
            text-align: center; padding: 120px 24px;
            color: var(--muted-dim);
            font-size: 1rem;
        }
        .no-data .icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            opacity: 0.4;
        }

        /* ── Brew controls ── */
        .brew-controls {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .brew-controls.visible { display: flex; }
        .brew-picker {
            padding: 7px 14px;
            background: rgba(200, 145, 58, 0.05);
            border: 1px solid rgba(200, 145, 58, 0.12);
            border-radius: 8px;
            color: var(--cream);
            font-size: 0.78rem;
            font-family: var(--font-body);
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .brew-picker:hover { border-color: rgba(200, 145, 58, 0.25); }
        .brew-picker option { background: var(--ink-surface); color: var(--cream); }

        .read-only-banner {
            text-align: center;
            padding: 10px;
            background: rgba(106, 154, 184, 0.06);
            border-bottom: 1px solid rgba(106, 154, 184, 0.12);
            color: var(--info);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.03em;
        }

        /* ── History view ── */
        .history-view {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--amber-dim);
        }
        .history-header h2 {
            font-family: var(--font-display);
            color: var(--amber);
            font-size: 1.8rem;
            font-weight: 700;
        }
        .brew-card {
            background: var(--ink-card);
            border: 1px solid rgba(200, 145, 58, 0.08);
            border-radius: var(--radius);
            padding: 22px 24px;
            margin-bottom: 12px;
            backdrop-filter: blur(12px);
            transition: border-color 0.3s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        .brew-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 3px;
            background: var(--amber);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .brew-card:hover {
            border-color: rgba(200, 145, 58, 0.2);
            transform: translateX(2px);
        }
        .brew-card:hover::before { opacity: 1; }
        .brew-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }
        .brew-card-name {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--parchment);
            font-style: italic;
        }
        .brew-card-status {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .brew-card-status.completed {
            background: rgba(90, 158, 111, 0.1);
            color: var(--success);
        }
        .brew-card-status.active {
            background: rgba(200, 145, 58, 0.1);
            color: var(--amber);
        }
        .brew-card-details {
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            line-height: 1.8;
        }
        .brew-card-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .brew-card-stat {
            font-family: var(--font-mono);
            color: var(--amber);
            font-weight: 500;
            font-size: 0.78rem;
        }
        .brew-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }

        /* ── Responsive ── */
        @media (max-width: 550px) {
            .header { padding: 24px 16px 20px; }
            .header h1 { font-size: 1.8rem; }
            .cards { padding: 16px 12px; gap: 10px; }
            .gauge-card, .info-card { padding: 14px 10px 12px; }
            .gauge-wrap { max-width: 120px; }
            .gauge-value { font-size: 1.15rem; }
            .info-card .value { font-size: 1.3rem; }
            .info-card .value.eta { font-size: 1rem; }
            .info-card .value.status { font-size: 1rem; }
            .chart-container { padding: 6px 12px 12px; }
            .cheers-text { font-size: 3rem; }
            .modal { padding: 24px; }
            .progress-section { padding: 0 12px 8px; }
            .toolbar { padding: 8px 12px 16px; gap: 6px; }
            .history-view { padding: 20px 12px; }
            .history-header h2 { font-size: 1.4rem; }
            .brew-card { padding: 16px; }
            .brew-card-stats { gap: 12px; }
            .brew-card-name { font-size: 1.05rem; }
        }

        /* ── Fade-in animation ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .content-inner .cards > * {
            animation: fadeUp 0.5s ease both;
        }
        .content-inner .cards > :nth-child(1) { animation-delay: 0.05s; }
        .content-inner .cards > :nth-child(2) { animation-delay: 0.1s; }
        .content-inner .cards > :nth-child(3) { animation-delay: 0.15s; }
        .content-inner .cards > :nth-child(4) { animation-delay: 0.2s; }
        .content-inner .cards > :nth-child(5) { animation-delay: 0.25s; }
        .content-inner .progress-section { animation: fadeUp 0.5s ease 0.3s both; }
        .content-inner .toolbar { animation: fadeUp 0.5s ease 0.35s both; }
        .content-inner .chart-container:first-of-type { animation: fadeUp 0.5s ease 0.4s both; }
        .content-inner .chart-container:last-of-type { animation: fadeUp 0.5s ease 0.45s both; }
    </style>
</head>
<body>
    <canvas id="bubbles"></canvas>

    <!-- Cheers overlay -->
    <div id="cheers-overlay">
        <div class="cheers-text">Cheers!</div>
    </div>

    <!-- Settings modal -->
    <div class="modal-backdrop" id="settings-modal">
        <div class="modal">
            <h2>Brew Settings</h2>
            <label for="cfg-name">Brew Name</label>
            <input id="cfg-name" type="text" placeholder="Dad's IPA, Batch #12">
            <label for="cfg-fg">Target Final Gravity</label>
            <input id="cfg-fg" type="number" step="0.001" placeholder="1.010">
            <label for="cfg-temp-low">Min Temp (&deg;F)</label>
            <input id="cfg-temp-low" type="number" step="1" placeholder="60">
            <label for="cfg-temp-high">Max Temp (&deg;F)</label>
            <input id="cfg-temp-high" type="number" step="1" placeholder="75">
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
                <button class="btn btn-primary" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="header">
            <h1>TiltPi<span>Hydrometer Monitor</span></h1>
            <div class="brew-name" id="brew-name" onclick="openSettings()" title="Click to edit brew settings"></div>
            <div class="sub" id="last-updated">Waiting for data...</div>
            <div class="brew-controls" id="brew-controls">
                <select class="brew-picker" id="brew-picker" onchange="switchBrew(this.value)">
                    <option value="">Current Brew</option>
                </select>
                <button class="btn btn-ghost btn-sm" id="btn-start-brew" onclick="startNewBrew()">Start New Brew</button>
                <button class="btn btn-ghost btn-sm" id="btn-end-brew" onclick="endCurrentBrew()">End Brew</button>
            </div>
        </div>
        <div class="read-only-banner" id="read-only-banner" style="display:none"></div>
        <div id="main-content" class="no-data">
            <div class="icon">&#127866;</div>
            No readings yet. Make sure the Tilt monitor is running.
        </div>
    </div>

    <script>
    /* ════════════════════════════════════
       BREW STATE & CONFIG
       ════════════════════════════════════ */
    let brewConfig = { brew_name: '', target_fg: 1.010, temp_low: 60, temp_high: 75 };
    let viewingBrewId = null;  // null = active brew
    let allBrews = [];
    let pollInterval = null;

    async function loadConfig() {
        try {
            const res = await fetch('/api/config');
            brewConfig = await res.json();
        } catch(e) {}
    }

    async function loadBrews() {
        try {
            const res = await fetch('/api/brews');
            allBrews = await res.json();
            const picker = document.getElementById('brew-picker');
            while (picker.options.length > 1) picker.remove(1);
            allBrews.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.id;
                const status = b.status === 'active' ? '' : ` (${b.status})`;
                opt.textContent = (b.name || `Brew #${b.id}`) + status;
                picker.appendChild(opt);
            });
            document.getElementById('brew-controls').classList.add('visible');
        } catch(e) {}
    }

    function switchBrew(brewId) {
        const banner = document.getElementById('read-only-banner');
        if (brewId && brewId !== '') {
            viewingBrewId = parseInt(brewId);
            const brew = allBrews.find(b => b.id === viewingBrewId);
            const isActive = brew && brew.status === 'active';
            if (isActive) {
                banner.style.display = 'none';
                document.getElementById('btn-end-brew').style.display = '';
                document.getElementById('btn-start-brew').style.display = '';
                if (!pollInterval) pollInterval = setInterval(fetchData, 5000);
            } else {
                banner.textContent = `Viewing: ${brew ? brew.name || 'Brew #' + brew.id : 'Past brew'} (read-only)`;
                banner.style.display = 'block';
                document.getElementById('btn-end-brew').style.display = 'none';
                document.getElementById('btn-start-brew').style.display = 'none';
                if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
            }
        } else {
            viewingBrewId = null;
            banner.style.display = 'none';
            document.getElementById('btn-end-brew').style.display = '';
            document.getElementById('btn-start-brew').style.display = '';
            if (!pollInterval) pollInterval = setInterval(fetchData, 5000);
        }
        fetchData();
    }

    async function startNewBrew() {
        if (!confirm('Start a new brew? This will end the current brew if one is active.')) return;
        try {
            await fetch('/api/brews/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({}),
            });
            viewingBrewId = null;
            document.getElementById('brew-picker').value = '';
            document.getElementById('read-only-banner').style.display = 'none';
            await loadBrews();
            await loadConfig();
            fetchData();
        } catch(e) { console.error('Failed to start brew:', e); }
    }

    async function endCurrentBrew() {
        const active = allBrews.find(b => b.status === 'active');
        if (!active) { alert('No active brew to end.'); return; }
        if (!confirm(`End "${active.name || 'Brew #' + active.id}"?`)) return;
        try {
            await fetch(`/api/brews/${active.id}/end`, { method: 'POST' });
            await loadBrews();
            fetchData();
        } catch(e) { console.error('Failed to end brew:', e); }
    }

    function openSettings() {
        const isReadOnly = viewingBrewId !== null && (() => {
            const brew = allBrews.find(b => b.id === viewingBrewId);
            return brew && brew.status !== 'active';
        })();

        let cfg;
        if (isReadOnly) {
            const brew = allBrews.find(b => b.id === viewingBrewId);
            cfg = { brew_name: brew.name, target_fg: brew.target_fg, temp_low: brew.temp_low, temp_high: brew.temp_high };
        } else {
            cfg = brewConfig;
        }

        document.getElementById('cfg-name').value = cfg.brew_name || '';
        document.getElementById('cfg-fg').value = cfg.target_fg || 1.010;
        document.getElementById('cfg-temp-low').value = cfg.temp_low || 60;
        document.getElementById('cfg-temp-high').value = cfg.temp_high || 75;

        document.getElementById('cfg-fg').disabled = isReadOnly;
        document.getElementById('cfg-temp-low').disabled = isReadOnly;
        document.getElementById('cfg-temp-high').disabled = isReadOnly;

        document.getElementById('settings-modal').classList.add('open');
    }

    function closeSettings() {
        document.getElementById('settings-modal').classList.remove('open');
    }

    async function saveSettings() {
        const isReadOnly = viewingBrewId !== null && (() => {
            const brew = allBrews.find(b => b.id === viewingBrewId);
            return brew && brew.status !== 'active';
        })();

        if (isReadOnly) {
            const name = document.getElementById('cfg-name').value;
            try {
                await fetch(`/api/brews/${viewingBrewId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name }),
                });
                await loadBrews();
            } catch(e) {}
        } else {
            brewConfig.brew_name = document.getElementById('cfg-name').value;
            brewConfig.target_fg = parseFloat(document.getElementById('cfg-fg').value) || 1.010;
            brewConfig.temp_low = parseFloat(document.getElementById('cfg-temp-low').value) || 60;
            brewConfig.temp_high = parseFloat(document.getElementById('cfg-temp-high').value) || 75;
            try {
                await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(brewConfig),
                });
            } catch(e) {}
        }
        closeSettings();
        fetchData();
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function showHistory() {
        const content = document.getElementById('main-content');
        if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }

        let html = `
            <div class="history-view">
                <div class="history-header">
                    <h2>Brew History</h2>
                    <button class="btn btn-ghost btn-sm" onclick="backToDashboard()">Back to Dashboard</button>
                </div>`;

        if (allBrews.length === 0) {
            html += '<p style="color:var(--muted-dim);text-align:center;padding:40px 0">No brews yet.</p>';
        } else {
            allBrews.forEach(b => {
                const name = escapeHtml(b.name || `Brew #${b.id}`);
                const started = b.started_at ? new Date(b.started_at).toLocaleDateString() : '\u2014';
                const ended = b.ended_at ? new Date(b.ended_at).toLocaleDateString() : 'Ongoing';
                const duration = b.ended_at
                    ? Math.round((new Date(b.ended_at) - new Date(b.started_at)) / 86400000) + ' days'
                    : Math.round((Date.now() - new Date(b.started_at)) / 86400000) + ' days so far';
                const color = escapeHtml(b.color || '');

                html += `
                <div class="brew-card">
                    <div class="brew-card-header">
                        <span class="brew-card-name">${name}</span>
                        <span class="brew-card-status ${b.status}">${b.status}</span>
                    </div>
                    <div class="brew-card-details">
                        ${color ? color + ' Tilt &bull; ' : ''}${started} \u2014 ${ended} &bull; ${duration}
                    </div>
                    <div class="brew-card-stats">
                        ${b.og ? `<span class="brew-card-stat">OG: ${b.og.toFixed(3)}</span>` : ''}
                        ${b.fg ? `<span class="brew-card-stat">FG: ${b.fg.toFixed(3)}</span>` : ''}
                        ${b.abv ? `<span class="brew-card-stat">ABV: ${b.abv}%</span>` : ''}
                    </div>
                    <div class="brew-card-actions">
                        <button class="btn btn-ghost btn-sm" onclick="viewBrew(${b.id})">View</button>
                        <button class="btn btn-ghost btn-sm" onclick="window.location='/api/export.csv?brew_id=${b.id}'">Export CSV</button>
                        <button class="btn btn-ghost btn-sm" onclick="deleteBrew(${b.id}, '${name.replace(/'/g, "\\'")}')" style="color:var(--danger)">Delete</button>
                    </div>
                </div>`;
            });
        }
        html += '</div>';
        content.className = 'content-inner';
        content.innerHTML = html;
        initialized = false;
    }

    async function deleteBrew(brewId, name) {
        if (!confirm(`Delete "${name}"? This will permanently remove all its readings.`)) return;
        try {
            await fetch(`/api/brews/${brewId}`, { method: 'DELETE' });
            await loadBrews();
            showHistory();
        } catch(e) { console.error('Failed to delete brew:', e); }
    }

    function viewBrew(brewId) {
        document.getElementById('brew-picker').value = brewId;
        switchBrew(brewId);
    }

    function backToDashboard() {
        viewingBrewId = null;
        document.getElementById('brew-picker').value = '';
        document.getElementById('read-only-banner').style.display = 'none';
        document.getElementById('btn-end-brew').style.display = '';
        document.getElementById('btn-start-brew').style.display = '';
        initialized = false;
        if (!pollInterval) pollInterval = setInterval(fetchData, 5000);
        fetchData();
    }

    /* ════════════════════════════════════
       CHEERS ANIMATION
       ════════════════════════════════════ */
    let cheersShown = false;

    function showCheers() {
        if (cheersShown) return;
        cheersShown = true;
        const overlay = document.getElementById('cheers-overlay');
        overlay.style.display = 'block';

        const colors = ['#c8913a', '#b87333', '#5a9e6f', '#6a9ab8', '#c44', '#e5a84b', '#d9cbb8'];
        for (let i = 0; i < 80; i++) {
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.left = Math.random() * 100 + '%';
            piece.style.top = '-10px';
            piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            piece.style.animationDelay = (Math.random() * 1.5) + 's';
            piece.style.animationDuration = (2 + Math.random() * 2) + 's';
            piece.style.width = (5 + Math.random() * 8) + 'px';
            piece.style.height = (5 + Math.random() * 8) + 'px';
            overlay.appendChild(piece);
        }

        bubbles.forEach(b => { b.speed *= 3; b.opacity = Math.min(0.3, b.opacity * 3); });
        setTimeout(() => {
            bubbles.forEach(b => { b.speed /= 3; b.opacity /= 3; });
        }, 3000);

        setTimeout(() => { overlay.style.display = 'none'; }, 4000);
    }

    /* ════════════════════════════════════
       BUBBLE ANIMATION
       ════════════════════════════════════ */
    const bubbleCanvas = document.getElementById('bubbles');
    const bCtx = bubbleCanvas.getContext('2d');
    let bubbles = [];

    function resizeBubbleCanvas() {
        bubbleCanvas.width = window.innerWidth;
        bubbleCanvas.height = window.innerHeight;
    }
    resizeBubbleCanvas();
    window.addEventListener('resize', resizeBubbleCanvas);

    class Bubble {
        constructor() { this.reset(true); }
        reset(init) {
            this.x = Math.random() * bubbleCanvas.width;
            this.y = init ? Math.random() * bubbleCanvas.height : bubbleCanvas.height + 20;
            this.r = 2 + Math.random() * 6;
            this.speed = 0.3 + Math.random() * 0.8;
            this.wobbleAmp = 0.3 + Math.random() * 0.8;
            this.wobbleFreq = 0.01 + Math.random() * 0.02;
            this.phase = Math.random() * Math.PI * 2;
            this.opacity = 0.03 + Math.random() * 0.08;
        }
        update() {
            this.y -= this.speed;
            this.x += Math.sin(this.phase) * this.wobbleAmp;
            this.phase += this.wobbleFreq;
            if (this.y < -20) this.reset(false);
        }
        draw(ctx) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200, 145, 58, ${this.opacity})`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.25, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(240, 230, 211, ${this.opacity * 0.5})`;
            ctx.fill();
        }
    }

    for (let i = 0; i < 50; i++) bubbles.push(new Bubble());

    function animateBubbles() {
        bCtx.clearRect(0, 0, bubbleCanvas.width, bubbleCanvas.height);
        bubbles.forEach(b => { b.update(); b.draw(bCtx); });
        requestAnimationFrame(animateBubbles);
    }
    animateBubbles();

    /* ════════════════════════════════════
       GAUGE DRAWING
       ════════════════════════════════════ */
    function drawGauge(canvasId, value, min, max, color, colorDim) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.parentElement.getBoundingClientRect();
        const w = Math.round(rect.width);
        const h = Math.round(w * 0.6);
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.scale(dpr, dpr);

        const cx = w / 2, cy = h - 5;
        const radius = Math.min(w, h * 1.5) * 0.4;
        const startAngle = Math.PI;
        const endAngle = 2 * Math.PI;
        const pct = Math.min(1, Math.max(0, (value - min) / (max - min)));
        const valueAngle = startAngle + pct * Math.PI;

        // Track background
        ctx.beginPath();
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.lineWidth = 8;
        ctx.strokeStyle = colorDim;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Value arc
        ctx.beginPath();
        ctx.arc(cx, cy, radius, startAngle, valueAngle);
        ctx.lineWidth = 8;
        ctx.strokeStyle = color;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Glow tip
        ctx.shadowColor = color;
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, Math.max(startAngle, valueAngle - 0.1), valueAngle);
        ctx.lineWidth = 8;
        ctx.strokeStyle = color;
        ctx.lineCap = 'round';
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    /* ════════════════════════════════════
       CHARTS & DATA
       ════════════════════════════════════ */
    let gravityChart, tempChart, initialized = false;

    const chartColors = {
        gravity: '#c8913a',
        gravityBg: 'rgba(200, 145, 58, 0.08)',
        temp: '#b87333',
        tempBg: 'rgba(184, 115, 51, 0.08)',
        grid: 'rgba(200, 145, 58, 0.06)',
        tick: '#564d3f',
        label: '#7a6b56',
    };

    function initDashboard(container) {
        initialized = true;
        container.className = 'content-inner';
        container.innerHTML = `
            <div class="cards">
                <div class="gauge-card" id="sg-card">
                    <div class="label">Specific Gravity</div>
                    <div class="gauge-wrap">
                        <canvas id="sgGauge"></canvas>
                        <div class="gauge-value gravity" id="sg">--</div>
                    </div>
                    <div class="gauge-sub" id="sg-sub"></div>
                </div>
                <div class="gauge-card" id="temp-card">
                    <div class="label">Temperature</div>
                    <div class="gauge-wrap">
                        <canvas id="tempGauge"></canvas>
                        <div class="gauge-value temp" id="temp">--</div>
                    </div>
                    <div class="gauge-sub" id="temp-sub"></div>
                    <div class="temp-warning" id="temp-warning" style="display:none"></div>
                </div>
                <div class="info-card">
                    <div class="label">Est. ABV</div>
                    <div class="value abv" id="abv">--</div>
                    <div class="sub" id="abv-sub"></div>
                </div>
                <div class="info-card">
                    <div class="label">Fermentation</div>
                    <div class="value status" id="ferm-status">--</div>
                    <div class="sub" id="ferm-sub"></div>
                </div>
                <div class="info-card">
                    <div class="label">Est. Time Left</div>
                    <div class="value eta" id="eta">--</div>
                    <div class="sub" id="eta-sub"></div>
                </div>
            </div>
            <div class="progress-section">
                <div class="progress-header">
                    <span id="og-label">OG: --</span>
                    <span id="fg-label">Target FG: --</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
                </div>
                <div class="progress-label" id="progress-label"></div>
            </div>
            <div class="toolbar">
                <button class="btn btn-ghost" onclick="openSettings()">Brew Settings</button>
                <button class="btn btn-ghost" onclick="window.location=viewingBrewId ? '/api/export.csv?brew_id='+viewingBrewId : '/api/export.csv'">Export CSV</button>
                <button class="btn btn-ghost" onclick="showHistory()">Brew History</button>
                <button class="btn btn-ghost" onclick="window.location='/api/backup.db'">Download Backup</button>
            </div>
            <div class="chart-container"><canvas id="gravityChart" height="130"></canvas></div>
            <div class="chart-container"><canvas id="tempChart" height="130"></canvas></div>
        `;

        const chartOpts = (label) => ({
            responsive: true,
            animation: { duration: 600 },
            plugins: {
                legend: { display: false },
                title: {
                    display: true, text: label,
                    color: chartColors.label,
                    font: { size: 12, family: 'Outfit', weight: 400 },
                    padding: { top: 14, bottom: 8 }
                }
            },
            scales: {
                x: {
                    ticks: { color: chartColors.tick, maxTicksLimit: 8, font: { size: 10, family: 'DM Mono' } },
                    grid: { color: chartColors.grid }
                },
                y: {
                    ticks: { color: chartColors.tick, font: { size: 10, family: 'DM Mono' } },
                    grid: { color: chartColors.grid }
                }
            }
        });

        gravityChart = new Chart(document.getElementById('gravityChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    data: [], borderColor: chartColors.gravity, borderWidth: 2,
                    pointRadius: 0, fill: true,
                    backgroundColor: chartColors.gravityBg,
                    tension: 0.3
                }]
            },
            options: chartOpts('Specific Gravity')
        });

        tempChart = new Chart(document.getElementById('tempChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    data: [], borderColor: chartColors.temp, borderWidth: 2,
                    pointRadius: 0, fill: true,
                    backgroundColor: chartColors.tempBg,
                    tension: 0.3
                }]
            },
            options: chartOpts('Temperature (\u00b0F)')
        });
    }

    function getFermentationStatus(readings) {
        if (readings.length < 2) return { label: 'Waiting', cls: 'status-active', detail: 'Collecting data...' };

        const recent = readings.slice(-12);
        const older = readings.slice(-24, -12);
        if (older.length === 0) return { label: 'Active', cls: 'status-active', detail: 'Fermentation started' };

        const recentAvg = recent.reduce((s, r) => s + r.gravity, 0) / recent.length;
        const olderAvg = older.reduce((s, r) => s + r.gravity, 0) / older.length;
        const drop = olderAvg - recentAvg;

        if (drop < 0.0005) return { label: 'Complete', cls: 'status-complete', detail: 'Gravity stable' };
        if (drop < 0.002) return { label: 'Slowing', cls: 'status-slowing', detail: 'Nearing completion' };
        return { label: 'Active', cls: 'status-active', detail: `Dropping ~${(drop * 1000).toFixed(1)} pts/cycle` };
    }

    function estimateTimeLeft(readings, targetFg) {
        if (readings.length < 24) return { text: '--', detail: 'Need more data' };

        const recent = readings.slice(-24);
        const first = recent[0];
        const last = recent[recent.length - 1];
        const timeDiffHrs = (new Date(last.timestamp) - new Date(first.timestamp)) / 3600000;
        if (timeDiffHrs < 1) return { text: '--', detail: 'Need more data' };

        const gravityDrop = first.gravity - last.gravity;
        if (gravityDrop <= 0.0005) return { text: 'Done', detail: 'Gravity stable' };

        const ratePerHr = gravityDrop / timeDiffHrs;
        const remaining = last.gravity - targetFg;
        if (remaining <= 0) return { text: 'Done', detail: 'Target reached' };

        const hoursLeft = remaining / ratePerHr;
        if (hoursLeft > 240) return { text: `${Math.round(hoursLeft / 24)}d`, detail: `~${(ratePerHr * 24 * 1000).toFixed(1)} pts/day` };
        if (hoursLeft > 48) return { text: `${Math.round(hoursLeft / 24)}d ${Math.round(hoursLeft % 24)}h`, detail: `~${(ratePerHr * 24 * 1000).toFixed(1)} pts/day` };
        return { text: `${Math.round(hoursLeft)}h`, detail: `~${(ratePerHr * 24 * 1000).toFixed(1)} pts/day` };
    }

    async function fetchData() {
        try {
            const url = viewingBrewId ? `/api/brews/${viewingBrewId}/readings` : '/api/readings';
            const res = await fetch(url);
            const data = await res.json();

            const content = document.getElementById('main-content');
            if (!data.length) {
                content.className = 'no-data';
                content.innerHTML = '<div class="icon">&#127866;</div>No readings yet. Make sure the Tilt monitor is running.';
                initialized = false;
                return;
            }
            if (!initialized) initDashboard(content);

            const latest = data[data.length - 1];
            const og = data[0].gravity;
            const sg = latest.gravity;
            const abv = (og - sg) * 131.25;
            let viewConfig = brewConfig;
            if (viewingBrewId) {
                const brew = allBrews.find(b => b.id === viewingBrewId);
                if (brew) {
                    viewConfig = {
                        brew_name: brew.name,
                        target_fg: brew.target_fg,
                        temp_low: brew.temp_low,
                        temp_high: brew.temp_high,
                    };
                }
            }
            const targetFg = viewConfig.target_fg || 1.010;
            const progress = Math.min(100, Math.max(0, ((og - sg) / (og - targetFg)) * 100));

            // Gauges
            drawGauge('sgGauge', sg, 1.000, 1.080, '#c8913a', 'rgba(200,145,58,0.1)');

            const tempOutOfRange = latest.temp_f < viewConfig.temp_low || latest.temp_f > viewConfig.temp_high;
            const tempColor = tempOutOfRange ? '#c44' : '#b87333';
            const tempColorDim = tempOutOfRange ? 'rgba(204,68,68,0.1)' : 'rgba(184,115,51,0.1)';
            drawGauge('tempGauge', latest.temp_f, 55, 85, tempColor, tempColorDim);

            const tempCard = document.getElementById('temp-card');
            const tempValueEl = document.getElementById('temp');
            const tempWarning = document.getElementById('temp-warning');
            if (tempOutOfRange) {
                tempCard.classList.add('temp-alert');
                tempValueEl.className = 'gauge-value temp-danger';
                tempWarning.style.display = 'block';
                tempWarning.textContent = latest.temp_f < viewConfig.temp_low
                    ? `Below ${viewConfig.temp_low}\u00b0F!`
                    : `Above ${viewConfig.temp_high}\u00b0F!`;
            } else {
                tempCard.classList.remove('temp-alert');
                tempValueEl.className = 'gauge-value temp';
                tempWarning.style.display = 'none';
            }

            document.getElementById('sg').textContent = sg.toFixed(3);
            document.getElementById('sg-sub').textContent = `OG: ${og.toFixed(3)}`;
            document.getElementById('temp').textContent = `${latest.temp_f}\u00b0F`;
            document.getElementById('temp-sub').textContent = `${latest.temp_c}\u00b0C`;

            document.getElementById('abv').textContent = `${abv.toFixed(1)}%`;
            document.getElementById('abv-sub').textContent = `from ${og.toFixed(3)}`;

            const status = getFermentationStatus(data);
            const statusEl = document.getElementById('ferm-status');
            statusEl.textContent = status.label;
            statusEl.className = `value status ${status.cls}`;
            document.getElementById('ferm-sub').textContent = status.detail;

            const eta = estimateTimeLeft(data, targetFg);
            document.getElementById('eta').textContent = eta.text;
            document.getElementById('eta-sub').textContent = eta.detail;

            document.getElementById('og-label').textContent = `OG: ${og.toFixed(3)}`;
            document.getElementById('fg-label').textContent = `Target FG: ${targetFg.toFixed(3)}`;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('progress-label').textContent = `${progress.toFixed(0)}% attenuation`;

            if (status.label === 'Complete' && sg <= targetFg + 0.002) {
                showCheers();
            }

            const displayName = viewConfig.brew_name
                ? `${viewConfig.brew_name} \u2022 Tilt ${latest.color}`
                : `Tilt ${latest.color}`;
            document.getElementById('brew-name').textContent = displayName;
            document.getElementById('last-updated').textContent =
                `Last reading: ${new Date(latest.timestamp).toLocaleString()}`;

            const labels = data.map(r => {
                const d = new Date(r.timestamp);
                return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
                    + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
            });

            gravityChart.data.labels = labels;
            gravityChart.data.datasets[0].data = data.map(r => r.gravity);
            gravityChart.update('none');

            tempChart.data.labels = labels;
            tempChart.data.datasets[0].data = data.map(r => r.temp_f);
            tempChart.update('none');

        } catch(e) { console.error('Fetch error:', e); }
    }

    // Init
    async function init() {
        await loadConfig();
        await loadBrews();
        fetchData();
        pollInterval = setInterval(fetchData, 5000);
    }
    init();
    </script>
